<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice — Ledger Studio</title>
<meta name="description" content="View and download this invoice.">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="public-invoice-page">
  <div class="public-invoice-wrap">

    <div class="public-invoice-topbar">
      <a href="index.html" class="logo"><span class="logo-mark">L</span>Ledger Studio</a>
      <div class="public-invoice-actions" id="publicActions" style="display:none;">
        <button class="theme-switch" id="themeSwitch" aria-label="Toggle dark mode"><span class="knob"></span></button>
        <button class="btn btn-ghost btn-sm" id="printBtn"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg> Print</button>
        <button class="btn btn-primary btn-sm" id="downloadPdfBtn">⬇ Download PDF</button>
      </div>
    </div>

    <div id="invoiceContainer"></div>

    <div class="invalid-link" id="invalidState" style="display:none;">
      <div class="ic"><svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M9 15l6-6M9 9l6 6"/></svg></div>
      <h3>This invoice link isn't valid</h3>
      <p style="margin-top:10px;">The link may be incomplete, or it may have been copied incorrectly. Ask the sender to share it again.</p>
    </div>

    <div class="public-invoice-footer" id="publicFooter" style="display:none;">
      Sent with <a href="index.html">Ledger Studio</a> — create your own invoices in minutes.
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>
<script src="invoice-view.js"></script>
</body>
</html>
